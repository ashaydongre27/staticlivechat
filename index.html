<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub CSV Appender</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117; /* GitHub Dark Mode Color */
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            margin: 0;
        }

        .container {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        h1 { font-size: 20px; color: #58a6ff; margin-top: 0; }
        
        label { font-size: 13px; font-weight: bold; display: block; margin-top: 15px; }
        input {
            width: 100%; padding: 8px; margin-top: 5px;
            background: #0d1117; border: 1px solid #30363d;
            color: #c9d1d9; border-radius: 6px; box-sizing: border-box;
        }

        .number-display {
            font-size: 48px; font-weight: bold; color: #3fb950;
            text-align: center; margin: 20px 0;
        }

        button {
            width: 100%; padding: 10px; font-size: 16px; font-weight: bold;
            border: none; border-radius: 6px; cursor: pointer; transition: 0.2s;
            margin-top: 15px;
        }

        .btn-generate { background-color: #238636; color: white; }
        .btn-generate:hover { background-color: #2ea043; }
        .btn-generate:disabled { background-color: #23482d; cursor: not-allowed; }

        .btn-save { background-color: #1f6feb; color: white; margin-top: 10px; }
        .btn-save:hover { background-color: #388bfd; }

        #log {
            margin-top: 20px; padding: 15px; background: #000;
            border: 1px solid #30363d; border-radius: 6px; font-family: monospace;
            font-size: 12px; color: #8b949e; height: 100px; overflow-y: auto;
        }
        .success { color: #3fb950; }
        .error { color: #f85149; }
    </style>
</head>
<body>

    <!-- GitHub Configuration Panel -->
    <div class="container" id="config-panel">
        <h1>⚙️ GitHub Connection Settings</h1>
        <p style="font-size: 12px; color: #8b949e;">This info is saved locally in your browser so you don't expose your token in the code.</p>
        
        <label>GitHub Username</label>
        <input type="text" id="gh-owner" placeholder="e.g., octocat">
        
        <label>Repository Name</label>
        <input type="text" id="gh-repo" placeholder="e.g., my-group-website">
        
        <label>File Path</label>
        <input type="text" id="gh-path" value="data.csv" placeholder="e.g., data.csv">
        
        <label>Personal Access Token (Classic)</label>
        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
        
        <button class="btn-save" onclick="saveSettings()">Save Settings</button>
    </div>

    <!-- Generator Panel -->
    <div class="container">
        <h1>🎲 Generate & Commit to GitHub</h1>
        <div class="number-display" id="display-number">--</div>
        <button class="btn-generate" id="gen-btn" onclick="generateAndCommit()">Generate & Append to GitHub CSV</button>
        <div id="log">Logs will appear here...</div>
    </div>

    <script>
        // --- 1. Load settings from browser memory when page loads ---
        window.onload = function() {
            document.getElementById('gh-owner').value = localStorage.getItem('gh_owner') || '';
            document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
            document.getElementById('gh-path').value = localStorage.getItem('gh_path') || 'data.csv';
            document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
        };

        // --- 2. Save settings to browser memory ---
        function saveSettings() {
            localStorage.setItem('gh_owner', document.getElementById('gh-owner').value);
            localStorage.setItem('gh_repo', document.getElementById('gh-repo').value);
            localStorage.setItem('gh_path', document.getElementById('gh-path').value);
            localStorage.setItem('gh_token', document.getElementById('gh-token').value);
            logMessage("Settings saved locally!", "success");
        }

        // --- 3. Main Function: Generate and Push to GitHub ---
        async function generateAndCommit() {
            const owner = document.getElementById('gh-owner').value;
            const repo = document.getElementById('gh-repo').value;
            const path = document.getElementById('gh-path').value;
            const token = document.getElementById('gh-token').value;

            if (!owner || !repo || !path || !token) {
                logMessage("Error: Please fill out all GitHub settings first.", "error");
                return;
            }

            // Disable button to prevent spam clicking
            const btn = document.getElementById('gen-btn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            // Generate Random Number and display it
            let randomNum = Math.floor(Math.random() * 1000) + 1;
            document.getElementById("display-number").innerText = randomNum;
            let timestamp = new Date().toISOString();
            
            logMessage(`Generated ${randomNum}. Fetching current CSV from GitHub...`);

            const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            const headers = {
                "Authorization": `token ${token}`,
                "Accept": "application/vnd.github.v3+json"
            };

            try {
                // Step A: Try to get the existing file
                let response = await fetch(apiUrl, { headers });
                let existingContent = "";
                let sha = null;
                let idCounter = 1;

                if (response.ok) {
                    // File exists
                    const data = await response.json();
                    sha = data.sha; // We need this to update the file
                    
                    // GitHub returns content encoded in Base64. We must decode it.
                    existingContent = decodeURIComponent(escape(atob(data.content)));
                    
                    // Calculate next ID
                    idCounter = existingContent.trim().split('\n').length;
                    logMessage(`Found existing file. Appending row ID ${idCounter}...`);
                } else if (response.status === 404) {
                    // File does not exist, start with header
                    existingContent = "ID,Timestamp,Random_Number";
                    logMessage("File not found. Creating new CSV file...");
                } else {
                    throw new Error(`GitHub API Error: ${response.status}`);
                }

                // Step B: Append the new data
                const newRow = `\n${idCounter},${timestamp},${randomNum}`;
                const updatedContent = existingContent + newRow;

                // Step C: Encode back to Base64
                const encodedContent = btoa(unescape(encodeURIComponent(updatedContent)));

                // Step D: Commit the file back to GitHub
                logMessage("Committing new data to GitHub...");
                const putResponse = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: headers,
                    body: JSON.stringify({
                        message: `Append random number ${randomNum} via web`,
                        content: encodedContent,
                        sha: sha // Only included if the file already existed
                    })
                });

                if (putResponse.ok) {
                    logMessage(`✅ Successfully committed number ${randomNum} to ${path}!`, "success");
                } else {
                    const errorData = await putResponse.json();
                    throw new Error(errorData.message);
                }

            } catch (error) {
                logMessage(`❌ Error: ${error.message}`, "error");
            } finally {
                // Re-enable button
                btn.disabled = false;
                btn.innerText = "Generate & Append to GitHub CSV";
            }
        }

        // --- Helper function for logging ---
        function logMessage(message, type = "") {
            const logBox = document.getElementById("log");
            const p = document.createElement("div");
            p.innerText = `> ${message}`;
            if (type === "success") p.className = "success";
            if (type === "error") p.className = "error";
            logBox.appendChild(p);
            logBox.scrollTop = logBox.scrollHeight;
        }
    </script>
</body>
</html>
